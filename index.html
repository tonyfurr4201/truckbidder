  // --- Post Load ---
  document.getElementById('loadForm').addEventListener('submit', async function(e) {

    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        contactName: document.querySelector('input[placeholder="Contact Name"]').value,
        email: document.querySelector('input[placeholder="Email"]').value,
        phone: document.querySelector('input[placeholder="Phone"]').value,
        pickupCity: document.querySelector('input[placeholder="Concord, NC"]').value,
        deliveryCity: document.querySelector('input[placeholder="Atlanta, GA"]').value,
        itemType: document.querySelector('select').value,
        weight: document.querySelector('input[placeholder="Example: 1,500 lbs"]').value,
        deliveryDate: document.querySelector('input[type="date"]').value,
        budget: document.querySelector('input[placeholder="Example: $450"]').value,
        details: document.querySelector('#loadForm textarea').value
      })
    });

    alert('Load submitted!');
    // Refresh the open loads list after posting
    loadOpenLoads();
  });
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BidAndTruckIt | Let Truckers Bid on Your Shipment</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: #17212b; background: #f5f7fa; }

    .logo { font-size: 28px; font-weight: 800; color: #ff7a00; }
    nav a { color: white; text-decoration: none; margin-left: 18px; font-weight: 600; }
    .hero { padding: 75px 7%; background: linear-gradient(rgba(17,24,39,.82),rgba(17,24,39,.82)), url('https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; color: white; }
    .hero h1 { font-size: clamp(36px, 7vw, 68px); max-width: 850px; margin: 0 0 16px; }
    .hero p { font-size: 22px; max-width: 720px; line-height: 1.45; }
    .btn { display: inline-block; background: #ff7a00; color: white; padding: 16px 28px; border-radius: 8px; text-decoration: none; font-weight: 800; margin: 10px 10px 0 0; border: none; cursor: pointer; }
    .btn.secondary { background: white; color: #111827; }

    .load-card { border-left: 6px solid #ff7a00; }

</head>
<body>
  <header>
    <div class="logo">BidAndTruckIt</div>
    <nav>
      <a href="#post">Post Load</a>
      <a href="#loads">Find Loads</a>
      <a href="#drivers">Drivers</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  // --- Submit Bid ---
  document.getElementById('bidForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const loadNum = document.querySelector('input[placeholder="001"]').value;
    const loadId = 'LOAD-' + String(loadNum).padStart(3, '0');

    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        type: "bid",
        loadId: loadId,
        driverName: document.querySelector('input[placeholder="Your Name"]').value,
        phone: document.querySelector('input[placeholder="Phone Number"]').value,
        bidAmount: document.querySelector('input[placeholder="$450"]').value,
        notes: document.querySelector('textarea[placeholder="Equipment type, route, notes"]').value
      })
    });

    alert('Bid submitted!');
  });
  <div class="hero">
    <h1>Post your shipment. Let truckers bid.</h1>
    <p>BidAndTruckIt helps people move equipment, attachments, tractors, materials...</p>
    <a class="btn" href="#post">Post a Load</a>
    <a class="btn" href="#drivers">Become a Driver</a>
  </div>

  <section>
    <h2>How It Works</h2>
    <div class="cards">
      <div class="card"><h3>1. Post Your Item</h3><p>Add photos, pickup location, delivery location, weight, size, and when it needs moved.</p></div>
      <div class="card"><h3>2. Truckers Bid</h3><p>Drivers and hotshot haulers send bids with price, pickup time, and delivery time.</p></div>
      <div class="card"><h3>3. Pick Your Hauler</h3><p>Choose the driver you like based on price, ratings, insurance, and profile.</p></div>
      <div class="card"><h3>4. Get It Delivered</h3><p>Track the shipment, message the driver, and leave a review after delivery.</p></div>
    </div>
  </section>

  <section id="post">
    <h2>Post a Load</h2>
    <form id="loadForm">
      <div class="form-grid">
        <div><label>Your Name</label><input placeholder="Contact Name" required></div>

        <div><label>Email</label><input placeholder="Email" required></div>

        <div><label>Phone</label><input placeholder="Phone" required></div>

  // --- Load OPEN loads only ---
  async function loadOpenLoads() {
    const response = await fetch(WEBAPP_URL);
    const rows = await response.json();

    const container = document.querySelector('#loads .cards');
    container.innerHTML = '';

    rows.slice(1).forEach(function(row) {
      // Apps Script returns: ... status at index 10
      const loadStatus = String(row[10] || '').trim().toUpperCase(); // OPEN / AWARDED
      if (loadStatus !== 'OPEN') return;

      const loadId = row[1];
      const pickup = row[5];
      const delivery = row[6];
      const itemType = row[7];
      const weight = row[8];

      container.innerHTML += `
        <div class="card load-card">
          <span class="badge">Open for bids</span>
          <h3>${loadId} - ${itemType}</h3>
          <p><b>Route:</b> ${pickup} to ${delivery}</p>
          <p><b>Weight:</b> ${weight}</p>
          <a class="btn" href="#drivers"
             onclick="document.querySelector('input[placeholder=&quot;001&quot;]').value='${loadId}'.replace('LOAD-','')">
             Bid on this Load
          </a>
        <div><label>Pickup City</label><input placeholder="Concord, NC" required></div>
        <div><label>Delivery City</label><input placeholder="Atlanta, GA" required></div>

        <div>
          <label>Item Type</label>
          <select>
            <option>Skid Steer Attachment</option>
            <option>Tractor</option>
            <option>Mini Excavator</option>
            <option>Farm Equipment</option>
            <option>Building Materials</option>
            <option>Other</option>
          </select>
</div>
      `;
    });
  }

  // --- Customer views bids for a load ---
  async function showBidsForLoad() {
    const loadId = 'LOAD-' + document.getElementById('customerLoadId').value.padStart(3, '0');
    const response = await fetch(WEBAPP_URL + '?loadId=' + loadId);
    const bids = await response.json();

    let html = '<h3>Bids Received</h3>';

    bids.forEach(function(bid) {
      // Bids columns: 0 ts, 1 loadId, 2 driver, 3 phone, 4 amount, 5 notes, 6 status
      const decision = bid[6] || '';

      let actionHtml =
        '<button class="btn" onclick="acceptBid(\'' + bid[1] + '\',\'' + bid[2] + '\')">Accept Bid</button>';

      if (decision === 'ACCEPTED') actionHtml = '<p><b>Status:</b> ACCEPTED</p>';
      if (decision === 'REJECTED') actionHtml = '<p><b>Status:</b> REJECTED</p>';

      html += `
        <div class="card">
          <p><b>Driver:</b> ${bid[2]}</p>
          <p><b>Phone:</b> ${bid[3]}</p>
          <p><b>Bid Amount:</b> $${bid[4]}</p>
          <p><b>Notes:</b> ${bid[5]}</p>
          ${actionHtml}

        <div><label>Estimated Weight</label><input placeholder="Example: 1,500 lbs"></div>
        <div><label>Target Delivery Date</label><input type="date"></div>

        <div><label>Budget</label><input placeholder="Example: $450"></div>
      </div>

      <br>
      <label>Upload Photos</label>
      <input type="file" multiple>

      <br><br>
      <label>Shipment Details</label>
      <textarea placeholder="Describe the item, size, loading help, unloading help, and any special notes."></textarea>

      <button class="btn" type="submit">Submit Load</button>
    </form>
  </section>

  <section id="loads">
    <h2>Loads Open For Bids</h2>
    <div class="cards"></div>
  </section>

  <section id="view-bids">
    <h2>View Bids For My Load</h2>

    <div class="card">
      <label>Enter Your Load ID</label>
      <div style="display:flex;align-items:center;">
        <span style="padding:8px;background:#eee;border:1px solid #ccc;border-right:none;">LOAD-</span>
        <input id="customerLoadId" placeholder="012" maxlength="3">
      </div>

      <br><br>

      <button class="btn" type="button" onclick="showBidsForLoad()">
        View Bids
      </button>

      <div id="bidResults"></div>
    </div>
  </section>

  <section id="drivers">
    <div class="card">
      <h3>Submit A Bid</h3>

      <form id="bidForm">
        <label>Load ID</label>
        <div style="display:flex;align-items:center;">
          <span style="padding:8px 12px;background:#f3f3f3;border:1px solid #ccc;border-right:none;">LOAD-</span>
          <input placeholder="001" maxlength="3">
</div>
      `;
    });

    document.getElementById('bidResults').innerHTML = html;
  }

  // --- Accept a bid ---
  async function acceptBid(loadId, driverName) {
    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        type: 'acceptBid',
        loadId: loadId,
        driverName: driverName
      })
    });

    alert('Bid accepted!');
    // Refresh bids + open loads after accepting
    showBidsForLoad();
    loadOpenLoads();
  }

  // Load loads on page load
  loadOpenLoads();
</script>

        <br><br>

        <button class="btn" type="submit">Submit Bid</button>
      </form>
    </div>
  </section>

            budget: document.querySelector('input[placeholder="Example: $450"]').value,
            details: document.querySelector('#loadForm textarea').value
          })

        alert('Load submitted!');

    if (bidForm) {

        await fetch(WEBAPP_URL, {
          method: 'POST',

          body: JSON.stringify({
            type: "bid",
            loadId: loadId,

            phone: document.querySelector('input[placeholder="Phone Number"]').value,
            bidAmount: document.querySelector('input[placeholder="$450"]').value,
            notes: document.querySelector('textarea[placeholder="Equipment type, route, notes"]').value
          })
        });

        alert('Bid submitted!');

    async function loadOpenLoads() {
      const container = document.querySelector('#loads .cards');
      if (!container) return;

      const response = await fetch(WEBAPP_URL);
      const rows = await response.json();

      container.innerHTML = '';

      rows.slice(1).forEach(function(row) {
        const loadStatus = String(row[10] || '').trim().toUpperCase(); // OPEN / AWARDED
        if (loadStatus !== 'OPEN') return;

        const loadId = row[1];
        const pickup = row[5];

        const itemType = row[7];
        const weight = row[8];

        container.innerHTML += `
          <div class="card load-card">
            <span class="badge">Open for bids</span>
            <h3>${loadId} - ${itemType}</h3>
            <p><b>Route:</b> ${pickup} to ${delivery}</p>
            <p><b>Weight:</b> ${weight}</p>
            <a class="btn" href="#drivers"
              onclick="document.querySelector('input[placeholder=&quot;001&quot;]').value='${loadId}'.replace('LOAD-','')">
              Bid on this Load
            </a>

        `;
      });
    }

    window.showBidsForLoad = async function() {
      const loadId = 'LOAD-' + document.getElementById('customerLoadId').value.padStart(3, '0');
      const response = await fetch(WEBAPP_URL + '?loadId=' + loadId);
      const bids = await response.json();

      let html = '<h3>Bids Received</h3>';

      bids.forEach(function(bid) {
        const decision = bid[6] || ''; // status

        let actionHtml =
          '<button class="btn" onclick="acceptBid(\'' + bid[1] + '\',\'' + bid[2] + '\')">Accept Bid</button>';

        if (decision === 'ACCEPTED') actionHtml = '<p><b>Status:</b> ACCEPTED</p>';
        if (decision === 'REJECTED') actionHtml = '<p><b>Status:</b> REJECTED</p>';

        html += `

            <p><b>Notes:</b> ${bid[5]}</p>
            ${actionHtml}
          </div>
        `;
      });

      document.getElementById('bidResults').innerHTML = html;

    window.acceptBid = async function(loadId, driverName) {
      await fetch(WEBAPP_URL, {

          type: 'acceptBid',
          loadId: loadId,

      alert('Bid accepted!');

    loadOpenLoads();
  });
