<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxGRtsn9wBTmjAqFIhD7iwqfzzQ2dHooe_iO0LUROJIwBPsSS1qu2l3Qs79im_RAxdg/exec";

  // --- Post Load ---
  document.getElementById('loadForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // NOTE: We still send budget in the payload (harmless), but we are NOT showing it on cards.
    // If you want, we can remove budget from the form later.
    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        contactName: document.querySelector('input[placeholder="Contact Name"]').value,
        email: document.querySelector('input[placeholder="Email"]').value,
        phone: document.querySelector('input[placeholder="Phone"]').value,
        pickupCity: document.querySelector('input[placeholder="Concord, NC"]').value,
        deliveryCity: document.querySelector('input[placeholder="Atlanta, GA"]').value,
        itemType: document.querySelector('select').value,
        weight: document.querySelector('input[placeholder="Example: 1,500 lbs"]').value,
        deliveryDate: document.querySelector('input[type="date"]').value,
        budget: document.querySelector('input[placeholder="Example: $450"]').value,
        details: document.querySelector('#loadForm textarea').value
      })
    });

    alert('Load submitted!');
    // Refresh the open loads list after posting
    loadOpenLoads();
  });

  // --- Submit Bid ---
  document.getElementById('bidForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const loadNum = document.querySelector('input[placeholder="001"]').value;
    const loadId = 'LOAD-' + String(loadNum).padStart(3, '0');

    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        type: "bid",
        loadId: loadId,
        driverName: document.querySelector('input[placeholder="Your Name"]').value,
        phone: document.querySelector('input[placeholder="Phone Number"]').value,
        bidAmount: document.querySelector('input[placeholder="$450"]').value,
        notes: document.querySelector('textarea[placeholder="Equipment type, route, notes"]').value
      })
    });

    alert('Bid submitted!');
  });

  // --- Load OPEN loads only ---
  async function loadOpenLoads() {
    const response = await fetch(WEBAPP_URL);
    const rows = await response.json();

    const container = document.querySelector('#loads .cards');
    container.innerHTML = '';

    rows.slice(1).forEach(function(row) {
      // Apps Script returns: ... status at index 10
      const loadStatus = String(row[10] || '').trim().toUpperCase(); // OPEN / AWARDED
      if (loadStatus !== 'OPEN') return;

      const loadId = row[1];
      const pickup = row[5];
      const delivery = row[6];
      const itemType = row[7];
      const weight = row[8];

      container.innerHTML += `
        <div class="card load-card">
          <span class="badge">Open for bids</span>
          <h3>${loadId} - ${itemType}</h3>
          <p><b>Route:</b> ${pickup} to ${delivery}</p>
          <p><b>Weight:</b> ${weight}</p>
          <a class="btn" href="#drivers"
             onclick="document.querySelector('input[placeholder=&quot;001&quot;]').value='${loadId}'.replace('LOAD-','')">
             Bid on this Load
          </a>
        </div>
      `;
    });
  }

  // --- Customer views bids for a load ---
  async function showBidsForLoad() {
    const loadId = 'LOAD-' + document.getElementById('customerLoadId').value.padStart(3, '0');
    const response = await fetch(WEBAPP_URL + '?loadId=' + loadId);
    const bids = await response.json();

    let html = '<h3>Bids Received</h3>';

    bids.forEach(function(bid) {
      // Bids columns: 0 ts, 1 loadId, 2 driver, 3 phone, 4 amount, 5 notes, 6 status
      const decision = bid[6] || '';

      let actionHtml =
        '<button class="btn" onclick="acceptBid(\'' + bid[1] + '\',\'' + bid[2] + '\')">Accept Bid</button>';

      if (decision === 'ACCEPTED') actionHtml = '<p><b>Status:</b> ACCEPTED</p>';
      if (decision === 'REJECTED') actionHtml = '<p><b>Status:</b> REJECTED</p>';

      html += `
        <div class="card">
          <p><b>Driver:</b> ${bid[2]}</p>
          <p><b>Phone:</b> ${bid[3]}</p>
          <p><b>Bid Amount:</b> $${bid[4]}</p>
          <p><b>Notes:</b> ${bid[5]}</p>
          ${actionHtml}
        </div>
      `;
    });

    document.getElementById('bidResults').innerHTML = html;
  }

  // --- Accept a bid ---
  async function acceptBid(loadId, driverName) {
    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        type: 'acceptBid',
        loadId: loadId,
        driverName: driverName
      })
    });

    alert('Bid accepted!');
    // Refresh bids + open loads after accepting
    showBidsForLoad();
    loadOpenLoads();
  }

  // Load loads on page load
  loadOpenLoads();
</script>
