<script>
/***************
 * bidandtruckit.com - Front-end logic (Firefox-safe reads via Published CSV)
 * Reads:
 *  - Loads CSV (filters OPEN)
 *  - Bids CSV (filters by Load ID)
 * Writes (Apps Script POST, no-cors):
 *  - addLoad, addBid, acceptBid
 ***************/

document.addEventListener("DOMContentLoaded", () => {

  // ====== CONFIG ======
  // 1) KEEP/SET your Apps Script Web App /exec URL here:
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwl_Y-KHgmgRuzN_-ZC5emJ8gwPOzmTJSTLiXu4dgG-WrdH6xVMs8F-h8bYXWN5UiUp/exec";

  // 2) Published CSV feeds (you provided these)
  const LOADS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQaD-4n_6IEp76TwCs3TyojCYFK-Jzyc5yJvDDvS9ZbN7RgLtfdVMuFyMKPZ7xo5b7Q9x0J3KvVK0Zs/pub?gid=0&single=true&output=csv";
  const BIDS_CSV_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQaD-4n_6IEp76TwCs3TyojCYFK-Jzyc5yJvDDvS9ZbN7RgLtfdVMuFyMKPZ7xo5b7Q9x0J3KvVK0Zs/pub?gid=3289704&single=true&output=csv";

  // ====== DOM HOOKS (adjust ONLY if your IDs differ) ======
  const loadsCardsEl = document.querySelector("#loads .cards");

  const loadForm = document.getElementById("loadForm"); // customer posts a load
  const bidsContainer = document.getElementById("bidsContainer"); // where bids render
  const viewBidsBtn = document.getElementById("viewBidsBtn"); // button to view bids
  const viewBidsLoadIdInput = document.getElementById("viewBidsLoadId"); // input for load id

  // If your site uses different IDs, paste your HTML snippet and I’ll remap them.
  // For now, this script will still load loads even if view-bids IDs differ.

  // ====== UTIL ======
  function escapeHtml_(s) {
    return String(s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // Robust CSV parser (handles quoted values with commas)
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cur = "";
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      const next = text[i + 1];

      if (c === '"' && inQuotes && next === '"') { // escaped quote
        cur += '"';
        i++;
        continue;
      }
      if (c === '"') {
        inQuotes = !inQuotes;
        continue;
      }
      if (c === ',' && !inQuotes) {
        row.push(cur);
        cur = "";
        continue;
      }
      if ((c === '\n' || c === '\r') && !inQuotes) {
        if (c === '\r' && next === '\n') i++;
        row.push(cur);
        cur = "";
        if (row.length > 1 || row[0] !== "") rows.push(row);
        row = [];
        continue;
      }
      cur += c;
    }
    row.push(cur);
    if (row.length > 1 || row[0] !== "") rows.push(row);

    return rows;
  }

  function norm_(v) {
    return String(v || "").trim();
  }
  function normUpper_(v) {
    return norm_(v).toUpperCase();
  }

  async function fetchCSV_(url) {
    const res = await fetch(url, { cache: "no-store" });
    const text = await res.text();
    return parseCSV(text);
  }

  // ====== LOADS (READ from CSV) ======
  async function loadOpenLoads() {
    if (!loadsCardsEl) return;

    loadsCardsEl.innerHTML = "<p>Loading loads…</p>";

    try {
      const table = await fetchCSV_(LOADS_CSV_URL);
      const rows = table.slice(1);

      // Loads columns (0-based):
      // 1 Load ID
      // 5 Pickup
      // 6 Delivery
      // 7 Item Type
      // 8 Weight
      // 9 Delivery Date
      // 10 Status
      const open = rows.filter(r => normUpper_(r[10]) === "OPEN");

      if (!open.length) {
        loadsCardsEl.innerHTML = "<p>No OPEN loads right now.</p>";
        return;
      }

      loadsCardsEl.innerHTML = open.map(r => {
        const loadId = escapeHtml_(norm_(r[1]));
        const pickup = escapeHtml_(norm_(r[5]));
        const delivery = escapeHtml_(norm_(r[6]));
        const itemType = escapeHtml_(norm_(r[7]));
        const weight = escapeHtml_(norm_(r[8]));
        const deliveryDate = escapeHtml_(norm_(r[9]));

        return `
          <div class="card">
            <h3>${loadId}</h3>
            <p><strong>Pickup:</strong> ${pickup}</p>
            <p><strong>Delivery:</strong> ${delivery}</p>
            <p><strong>Item:</strong> ${itemType}</p>
            <p><strong>Weight:</strong> ${weight}</p>
            <p><strong>Delivery Date:</strong> ${deliveryDate}</p>

            <hr />

            <h4>Place a Bid</h4>
            <form class="bidForm" data-loadid="${loadId}">
              <input name="driverName" placeholder="Driver Name" required />
              <input name="driverPhone" placeholder="Driver Phone" required />
              <input name="bidAmount" placeholder="Bid Amount" required />
              <input name="notes" placeholder="Notes (optional)" />
              <button type="submit">Submit Bid</button>
            </form>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".bidForm").forEach(form => {
        form.addEventListener("submit", submitBidFromForm);
      });

    } catch (err) {
      console.error(err);
      loadsCardsEl.innerHTML = `<p>Could not load loads. (${escapeHtml_(String(err))})</p>`;
    }
  }

  // ====== BIDS (READ from CSV) ======
  async function showBidsForLoad(loadId) {
    if (!bidsContainer) return;

    const cleanLoadId = normUpper_(loadId);
    if (!cleanLoadId) {
      bidsContainer.innerHTML = "<p>Please enter a Load ID.</p>";
      return;
    }

    bidsContainer.innerHTML = "<p>Loading bids…</p>";

    try {
      const table = await fetchCSV_(BIDS_CSV_URL);
      const rows = table.slice(1);

      // Bids columns (0-based):
      // 1 Load ID
      // 2 Driver Name
      // 3 Driver Phone
      // 4 Bid Amount
      // 5 Notes
      // 6 Status
      const bids = rows
        .filter(r => normUpper_(r[1]) === cleanLoadId)
        .map(r => ({
          loadId: cleanLoadId,
          driverName: norm_(r[2]),
          driverPhone: norm_(r[3]),
          bidAmount: norm_(r[4]),
          notes: norm_(r[5]),
          status: normUpper_(r[6]) || "PENDING"
        }));

      if (!bids.length) {
        bidsContainer.innerHTML = `<p>No bids found for <strong>${escapeHtml_(cleanLoadId)}</strong>.</p>`;
        return;
      }

      bids.sort((a, b) => (parseFloat(a.bidAmount) || 0) - (parseFloat(b.bidAmount) || 0));

      bidsContainer.innerHTML = `
        <h3>Bids for ${escapeHtml_(cleanLoadId)}</h3>
        ${bids.map(b => `
          <div class="card" style="margin-bottom:12px;">
            <p><strong>Driver:</strong> ${escapeHtml_(b.driverName || "(no name)")} (${escapeHtml_(b.driverPhone || "no phone")})</p>
            <p><strong>Bid:</strong> ${escapeHtml_(b.bidAmount || "(no amount)")} <strong>Status:</strong> ${escapeHtml_(b.status)}</p>
            ${b.notes ? `<p><strong>Notes:</strong> ${escapeHtml_(b.notes)}</p>` : ""}
            <button
              class="acceptBidBtn"
              data-loadid="${escapeHtml_(b.loadId)}"
              data-drivername="${escapeHtml_(b.driverName)}"
              data-driverphone="${escapeHtml_(b.driverPhone)}"
              data-bidamount="${escapeHtml_(b.bidAmount)}"
              ${b.status === "ACCEPTED" ? "disabled" : ""}
            >
              Accept this bid
            </button>
          </div>
        `).join("")}
      `;

      document.querySelectorAll(".acceptBidBtn").forEach(btn => {
        btn.addEventListener("click", acceptBidFromButton);
      });

    } catch (err) {
      console.error(err);
      bidsContainer.innerHTML = `<p>Could not load bids. (${escapeHtml_(String(err))})</p>`;
    }
  }

  // ====== WRITES (POST to Apps Script) ======
  async function postToWebApp_(payload) {
    // no-cors means we can’t read the response, but it will write to the sheet
    return fetch(WEBAPP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  }

  async function submitBidFromForm(ev) {
    ev.preventDefault();
    const form = ev.currentTarget;
    const loadId = form.getAttribute("data-loadid");

    const payload = {
      action: "addBid",
      loadId,
      driverName: form.driverName.value,
      driverPhone: form.driverPhone.value,
      bidAmount: form.bidAmount.value,
      notes: form.notes.value
    };

    try {
      await postToWebApp_(payload);
      alert("Bid submitted! It may take a moment to appear.");
      form.reset();
      // Refresh bids view if user is currently looking at this load
      if (viewBidsLoadIdInput && normUpper_(viewBidsLoadIdInput.value) === normUpper_(loadId)) {
        await showBidsForLoad(loadId);
      }
    } catch (err) {
      console.error(err);
      alert("Bid submit failed.");
    }
  }

  async function acceptBidFromButton(ev) {
    const btn = ev.currentTarget;

    const loadId = btn.getAttribute("data-loadid");
    const driverName = btn.getAttribute("data-drivername");
    const driverPhone = btn.getAttribute("data-driverphone");
    const bidAmount = btn.getAttribute("data-bidamount");

    if (!confirm(`Accept bid ${bidAmount} for ${loadId} from ${driverName}?`)) return;

    const payload = {
      action: "acceptBid",
      loadId,
      driverName,
      driverPhone,
      bidAmount
    };

    try {
      await postToWebApp_(payload);
      alert("Bid accepted! It may take a moment to update.");

      // Refresh both views
      await showBidsForLoad(loadId);
      await loadOpenLoads();
    } catch (err) {
      console.error(err);
      alert("Accept bid failed.");
    }
  }

  async function submitLoad(ev) {
    ev.preventDefault();
    if (!loadForm) return;

    // These field names must match your HTML input "name" attributes.
    // If your names differ, paste your form HTML and I’ll align them.
    const payload = {
      action: "addLoad",
      loadId: loadForm.loadId ? loadForm.loadId.value : "",
      customerName: loadForm.customerName ? loadForm.customerName.value : "",
      customerEmail: loadForm.customerEmail ? loadForm.customerEmail.value : "",
      customerPhone: loadForm.customerPhone ? loadForm.customerPhone.value : "",
      pickup: loadForm.pickup ? loadForm.pickup.value : "",
      delivery: loadForm.delivery ? loadForm.delivery.value : "",
      itemType: loadForm.itemType ? loadForm.itemType.value : "",
      weight: loadForm.weight ? loadForm.weight.value : "",
      deliveryDate: loadForm.deliveryDate ? loadForm.deliveryDate.value : ""
    };

    try {
      await postToWebApp_(payload);
      alert("Load submitted! It may take a moment to appear.");
      loadForm.reset();
      await loadOpenLoads();
    } catch (err) {
      console.error(err);
      alert("Load submit failed.");
    }
  }

  // ====== WIRE UP EVENTS ======
  if (loadForm) loadForm.addEventListener("submit", submitLoad);

  if (viewBidsBtn && viewBidsLoadIdInput) {
    viewBidsBtn.addEventListener("click", () => {
      showBidsForLoad(viewBidsLoadIdInput.value);
    });
  }

  // ====== INITIAL LOAD ======
  loadOpenLoads();

});
</script>
